# Nginx 虚拟主机伪静态规则
# 将此配置添加到您的 Nginx 服务器配置中

server {
    listen 80;
    server_name your-domain.com;  # 替换为您的域名
    root /path/to/your/project;   # 替换为您的项目路径
    index index.php index.html;
    
    # 字符集
    charset utf-8;
    
    # 日志配置
    access_log /var/log/nginx/your-domain-access.log;
    error_log /var/log/nginx/your-domain-error.log;
    
    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
    }
    
    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~* \.(sql|log|ini|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # RSS 重写规则
    location = /rss.xml {
        try_files $uri $uri/ /rss.php;
    }
    
    # API 重写规则
    location = /api {
        try_files $uri $uri/ /api.php$is_args$args;
    }
    
    location ~ ^/api/(.*)$ {
        try_files $uri $uri/ /api.php?$1$is_args$args;
    }
    
    # 搜索重写规则
    location = /search {
        try_files $uri $uri/ /search.php$is_args$args;
    }
    
    # 说说详情页重写规则
    location ~ ^/post/(\d+)$ {
        try_files $uri $uri/ /index.php?id=$1;
    }
    
    location ~ ^/p/(\d+)$ {
        try_files $uri $uri/ /index.php?id=$1;
    }
    
    # 分页重写规则
    location ~ ^/page/(\d+)$ {
        try_files $uri $uri/ /index.php?page=$1;
    }
    
    # PHP 处理
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;  # 或 unix:/var/run/php/php7.4-fpm.sock
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # PHP 参数优化
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
    }
    
    # 默认重写规则
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # 上传文件大小限制
    client_max_body_size 64M;
}
